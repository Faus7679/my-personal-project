# azure-pipelines.yml
trigger:
  branches:
    include:
      - "*"

pr:
  branches:
    include:
      - dev

variables:
  # Reference your Secret Variable Group here if you have one
  # or ensure AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY are in the Pipeline Variables UI
  terraformVersion: "1.5.7"
  awsRegion: "us-east-1"

stages:
  - stage: Terraform_Stage
    jobs:
      - job: Terraform_Job
        pool:
          vmImage: "ubuntu-latest"

        # Mapping secret variables to env variables for the whole job
        env:
          AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
          AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
          AWS_DEFAULT_REGION: $(awsRegion)

        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: "Install Terraform"
            inputs:
              terraformVersion: $(terraformVersion) # Fixed indentation and used variable

          - script: |
              terraform init
            displayName: "Terraform Init"

          - script: |
              terraform plan -out=tfplan
            displayName: "Terraform Plan"

          # Only runs on actual branch pushes (not PRs) to prevent accidental infra changes
          - script: |
              terraform apply -auto-approve tfplan
            displayName: "Terraform Apply"
            condition: and(succeeded(), eq(variables['Build.Reason'], 'IndividualCI'))
